<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>04 建设情况核实（轻量建站） — JET3.0 Demo</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bar-h: 52px;
            --primary: #0052D9;
            --bg: #F0F2F5;
            --tab-active: #fff;
            --tab-inactive: rgba(255,255,255,0.18);
            --compare-bg: #1a1a2e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: var(--bg);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ── 顶部工具栏 ── */
        .topbar {
            height: var(--bar-h);
            background: var(--primary);
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 12px;
            flex-shrink: 0;
            box-shadow: 0 2px 12px rgba(0,82,217,0.3);
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 5px;
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            padding: 5px 10px;
            border-radius: 6px;
            background: rgba(255,255,255,0.12);
            transition: background 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .back-btn:hover { background: rgba(255,255,255,0.22); color: #fff; }
        .back-btn svg { width: 14px; height: 14px; }

        .title {
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ── Tab 标签组 ── */
        .tabs {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }

        .tab {
            cursor: pointer;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            color: rgba(255,255,255,0.72);
            background: var(--tab-inactive);
            border: 1px solid rgba(255,255,255,0.18);
            transition: all 0.2s;
            user-select: none;
            white-space: nowrap;
        }
        .tab:hover { background: rgba(255,255,255,0.26); color: #fff; }
        .tab.active {
            background: #fff;
            color: var(--primary);
            font-weight: 700;
            border-color: transparent;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        /* ── iframe 面板 ── */
        .panel { display: none; flex: 1; overflow: hidden; }
        .panel.active { display: flex; }

        /* 单屏 */
        .panel-single iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 并排比对 */
        .panel-compare {
            flex-direction: row;
            background: var(--compare-bg);
            gap: 3px;
        }
        .compare-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .compare-label {
            background: var(--compare-bg);
            color: rgba(255,255,255,0.5);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 2px;
            text-align: center;
            padding: 5px 0;
            flex-shrink: 0;
        }
        .compare-label.v1 { color: #7dd3fc; }
        .compare-label.v2 { color: #86efac; }
        .compare-side iframe {
            flex: 1;
            width: 100%;
            border: none;
        }
        .compare-divider {
            width: 3px;
            background: rgba(255,255,255,0.08);
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <div class="topbar">
        <a href="#" class="back-btn" onclick="window.close(); if(!window.closed) window.location.href='index.html'; return false;">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>
            返回大厅
        </a>
        <span class="title">04 建设情况核实（轻量建站）</span>
        <div class="tabs">
            <div class="tab active" onclick="switchTab('v1')">V1 初版</div>
            <div class="tab" onclick="switchTab('v2')">V2 迭代版</div>
            <div class="tab" onclick="switchTab('compare')">⇔ 并排比对</div>
        </div>
    </div>

    <!-- Tab: V1 -->
    <div id="panel-v1" class="panel panel-single active">
        <iframe src="demo_建设情况核实_轻量建站.html" loading="lazy" allowfullscreen></iframe>
    </div>

    <!-- Tab: V2 -->
    <div id="panel-v2" class="panel panel-single">
        <iframe id="iframe-v2" src="" loading="lazy" allowfullscreen></iframe>
    </div>

    <!-- Tab: 并排比对 -->
    <div id="panel-compare" class="panel panel-compare">
        <div class="compare-side">
            <div class="compare-label v1">V 1 · 初版</div>
            <iframe id="iframe-cv1" src="" allowfullscreen></iframe>
        </div>
        <div class="compare-divider"></div>
        <div class="compare-side">
            <div class="compare-label v2">V 2 · 迭代版</div>
            <iframe id="iframe-cv2" src="" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        const V1 = 'v1/demo_建设情况核实_轻量建站.html';
        const V2 = 'v2/demo_建设情况核实_轻量建站.html';

        let loaded = { v1: true, v2: false, compare: false };
        let currentTab = 'v1';
        const tabs = { v1: 0, v2: 1, compare: 2 };

        function switchTab(name) {
            if (currentTab === name) return;
            currentTab = name;

            // 切换面板显示
            ['v1','v2','compare'].forEach(t => {
                document.getElementById('panel-' + t).classList.toggle('active', t === name);
                document.querySelectorAll('.tab')[tabs[t]].classList.toggle('active', t === name);
            });

            // 懒加载 iframe（避免全部提前加载拖慢速度）
            if (name === 'v2' && !loaded.v2) {
                document.getElementById('iframe-v2').src = V2;
                loaded.v2 = true;
            }
            if (name === 'compare' && !loaded.compare) {
                document.getElementById('iframe-cv1').src = V1;
                document.getElementById('iframe-cv2').src = V2;
                loaded.compare = true;
            }
        }
    </script>
</body>
</html>
