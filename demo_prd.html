<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>检e通V3.0 需求文档 (PRD)</title>
    <!-- 引入 GitHub 风格的 Markdown 美化 CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown-light.min.css">
    <style>
        body { 
            background-color: #F3F5F8; 
            margin: 0; 
            padding: 40px 20px; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
        }
        .markdown-container {
            max-width: 900px; 
            margin: 0 auto; 
            background: #fff; 
            padding: 48px 56px; 
            border-radius: 16px; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.04);
            border: 1px solid rgba(0,0,0,0.04);
        }
        @media (max-width: 768px) { 
            body { padding: 16px; }
            .markdown-container { padding: 24px 20px; } 
        }
        .back-btn { 
            display: inline-block; 
            margin-bottom: 24px; 
            color: #0052D9; 
            text-decoration: none; 
            font-weight: 600; 
            font-size: 14px; 
            padding: 6px 12px;
            background: rgba(0,82,217,0.06);
            border-radius: 8px;
            transition: all 0.2s;
        }
        .back-btn:hover { background: rgba(0,82,217,0.12); }
    </style>
</head>
<body>
    <div class="markdown-container">
        <a href="index.html" class="back-btn">← 返回演示大厅</a>
        <div id="content" class="markdown-body">
            <p style="text-align: center; color: #888; margin-top: 40px;">正在努力加载产品需求文档...</p>
            <p style="text-align: center; font-size: 12px; color: #ccc;">Powered by Marked.js</p>
        </div>
    </div>
    
    <!-- 引入强大的纯前端 Markdown 渲染引擎 Marked.js -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        // 抓取并解析用户指定的 Markdown 文件
        fetch('检e通V3.0_产品需求文档_PRD.md')
            .then(response => {
                if (!response.ok) throw new Error('网络读取失败，请检查文件名或路径');
                return response.text();
            })
            .then(text => {
                document.getElementById('content').innerHTML = marked.parse(text);
            })
            .catch(error => {
                document.getElementById('content').innerHTML = `
                    <div style="text-align:center; padding: 40px; color:#d32f2f;">
                        <h3>无法渲染该文档</h3>
                        <p>${error.message}</p>
                        <p style="font-size: 13px; color: #888;">提示：如果在本地直接双击打开此HTML，可能因为跨域安全限制无法读取同目录文件。部署到 Vercel 后将恢复正常！</p>
                    </div>
                `;
            });
    </script>
</body>
</html>
